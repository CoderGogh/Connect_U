<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect U - 회원가입</title>
    <link rel="stylesheet" href="/css/join.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="join-container">
        <div class="join-header">
            <h2>Connect U</h2>
            <p>새 계정을 만들고 커넥트에 합류하세요.</p>
        </div>

        <div id="error-box" class="alert-box"></div>

        <form id="join-form">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" class="form-control" placeholder="표시될 이름" required>
            </div>

            <div class="form-group">
                <label for="description">소개글 (선택)</label>
                <textarea id="description" class="form-control textarea"
                          placeholder="간단한 자기소개를 적어보세요."></textarea>
            </div>

            <button type="submit" class="btn-join">회원가입</button>
        </form>

        <div class="footer-links">
            이미 계정이 있나요?
            <a href="/html/login.html">로그인으로 이동</a>
        </div>
    </div>

    <script src="/js/join.js"></script>
</body>

</html>
