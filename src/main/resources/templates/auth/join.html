<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base(~{::title}, 'auth-body', ~{::main}, ~{::extraHead}, ~{::extraScripts}, ~{::topActions})}">
<head>
    <title>회원가입 | Connect U</title>
    <th:block th:fragment="extraHead">
        <link rel="stylesheet" th:href="@{/css/join.css}">
    </th:block>
</head>
<body>
<th:block th:fragment="topActions">
    <a class="cu-btn secondary" th:href="@{/login}">로그인</a>
</th:block>

<main th:fragment="main">
    <div class="join-container">
        <div class="join-header">
            <h2>Connect U</h2>
            <p>새 계정을 만들고 커넥트에 합류하세요.</p>
        </div>

        <div id="error-box" class="alert-box" role="alert"></div>

        <form id="join-form" novalidate>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" class="form-control" placeholder="표시될 이름" required>
            </div>

            <div class="form-group">
                <label for="description">소개글 (선택)</label>
                <textarea id="description" class="form-control" placeholder="간단한 자기소개를 적어보세요."></textarea>
            </div>

            <button type="submit" class="btn-join">회원가입</button>
        </form>

        <div class="footer-links">
            이미 계정이 있나요?
            <a th:href="@{/login}">로그인으로 이동</a>
        </div>
    </div>
</main>

<th:block th:fragment="extraScripts">
    <script th:src="@{/js/join.js}"></script>
</th:block>
</body>
</html>
